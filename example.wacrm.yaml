version: "3.8"

services:

  ## --------------------------- WACRM -------------------------- ##

  wacrm:
    image: wacrm:latest
    hostname: wacrm

    networks:
      - DwbCNet

    environment:
      - NODE_ENV=production

      ## Supabase
      - NEXT_PUBLIC_SUPABASE_URL=https://id_projeto.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=anon_key
      - SUPABASE_SERVICE_ROLE_KEY=role_key

      ## Criptografia e Segurança
      - ENCRYPTION_KEY=sua_encryption_key
      - META_APP_SECRET=secret_key_app
      - INSTAGRAM_APP_SECRET=secret_key_instagram
      - AUTOMATION_CRON_SECRET=generate-a-long-random-string

      ## Google Calendar
      - GOOGLE_CALENDAR_CLIENT_ID=your-client-id.apps.googleusercontent.com
      - GOOGLE_CALENDAR_CLIENT_SECRET=GOCSPX-your-client-secret
      - GOOGLE_CALENDAR_REDIRECT_URI=https://wacrm.seudominio.com.br/api/calendar/callback

      # RyzeAPI
      - RYZEAPI_API_URL=https://ryzeapi.cloud
      - RYZEAPI_ADMIN_TOKEN=admin_token

      ## URL pública
      - NEXT_PUBLIC_SITE_URL=https://wacrm.seudominio.com.br

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1"
          memory: 1024M
      labels:
        - traefik.enable=true
        - traefik.http.routers.wacrm.rule=Host(`wacrm.seudominio.com.br`)
        - traefik.http.routers.wacrm.entrypoints=websecure
        - traefik.http.routers.wacrm.priority=10
        - traefik.http.routers.wacrm.tls.certresolver=letsencryptresolver
        - traefik.http.routers.wacrm.service=wacrm
        - traefik.http.services.wacrm.loadbalancer.server.port=3000
        - traefik.http.services.wacrm.loadbalancer.passHostHeader=1

## --------------------------- WACRM -------------------------- ##

networks:
  DwbCNet:
    external: true
    name: DwbCNet
